  allureStory: 兔子模块接口测试

兔子_01:
  host: ${{host()}}
  url: /api/login/send_sms
  method: POST
  detail: 测试已注册手机号
  headers:
    User-Agent: Dalvik/2.1.0 (Linux; U; Android 12; V2366GA Build/55cac2b.0)
    Host: wwyd.vip.hnhxzkj.com
  requestType: json
  is_run:
  data:
    phone: '13224523466'
  dependence_case: false
  dependence_case_data:
  assert:
    code:
      jsonpath: $.code
      type: ==
      value: 500
      AssertType:
    msg:
      jsonpath: $.msg
      type: ==
      value: 本次测试验证码为:1111
      AssertType:
    data:
      jsonpath: $.data
      type: ==
      value: []
      AssertType:
  sql:
  extract:

