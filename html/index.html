<style>
[v-cloak] { display: none !important; }
/* Inline supplementary styles for rebuilt components */
.attach-strip-vue { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 6px 0; min-height: 72px; }
.attach-thumb-vue { position: relative; width: 64px; height: 64px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; flex-shrink: 0; }
.attach-thumb-vue img { width: 100%; height: 100%; object-fit: cover; }
.attach-thumb-vue .del-badge { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: #ef4444; color: #fff; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity .15s; }
.attach-thumb-vue:hover .del-badge { opacity: 1; }
.attach-add-vue { width: 64px; height: 64px; border: 2px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; color: var(--text3); flex-shrink: 0; transition: all .15s; }
.attach-add-vue:hover { border-color: var(--primary); color: var(--primary); }
.hint-text { font-size: 11px; color: var(--text3); }
.model-tag-vue { background: var(--primary-light); color: var(--primary); padding: 1px 8px; border-radius: 4px; font-size: 11px; margin-left: 6px; }
.summary-box-vue { color: var(--text2); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.console-panel-vue { border: 1px solid var(--border); border-radius: var(--card-radius); margin-top: 8px; background: #0d1117; color: #e6edf3; font-family: monospace; font-size: 12px; overflow: hidden; }
.console-header-vue { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #161b22; border-bottom: 1px solid #30363d; cursor: pointer; user-select: none; font-size: 12px; color: var(--text3); }
.console-header-vue .btns { margin-left: auto; display: flex; gap: 4px; }
.console-body-vue { padding: 8px 12px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
.console-body-vue .c-ok { color: #3fb950; }
.console-body-vue .c-err { color: #f85149; }
.console-body-vue .c-info { color: #58a6ff; }
.console-body-vue .c-warn { color: #d29922; }
.console-body-vue .c-dim { color: #8b949e; }
.console-body-vue .c-hr { border: none; border-top: 1px solid #30363d; margin: 4px 0; }
.history-modal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.history-modal-table td, .history-modal-table th { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
.history-row { cursor: pointer; transition: background .1s; }
.history-row:hover { background: var(--primary-light); }
.history-row pre { margin: 0; font-size: 11px; color: var(--text2); white-space: pre-wrap; word-break: break-all; max-height: 60px; overflow: hidden; }
/* Perf page styles */
.perf-slider-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.perf-slider-row label { width: 80px; font-size: 12px; color: var(--text2); flex-shrink: 0; }
.perf-slider-row input[type="range"] { flex: 1; accent-color: var(--primary); }
.perf-slider-row .val { width: 40px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text); }
.perf-metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
.perf-metric-card { background: var(--tab-bg); border-radius: 6px; padding: 10px 14px; text-align: center; }
.perf-metric-card.ok { border-left: 3px solid var(--primary); }
.perf-metric-card.err { border-left: 3px solid #ef4444; }
.perf-metric-card .label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.perf-metric-card .value { font-size: 20px; font-weight: 700; color: var(--text); }
.perf-metric-card .unit { font-size: 11px; color: var(--text3); font-weight: 400; }
.perf-lat-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.perf-lat-table td { padding: 6px 12px; border-bottom: 1px solid var(--border); }
.perf-lat-table td:first-child { color: var(--text2); width: 60px; }
.perf-lat-table td:last-child { text-align: right; font-weight: 600; font-family: monospace; }
.perf-progress-bar-vue { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 6px; }

.perf-header-item { display: flex; gap: 6px; margin: 4px 0; align-items: center; }

.perf-header-item .btn-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; padding: 0 4px; }
/* Mode switch buttons */
.mode-switch-bar { display: flex; gap: 4px; margin: 6px 0; }
.mode-switch-btn { padding: 5px 16px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; background: var(--surface); color: var(--text2); transition: all .15s; }
.mode-switch-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); font-weight: 600; }
/* Danmaku two-column */
.dm-two-col { display: flex; gap: 14px; flex: 1; min-height: 0; }
.dm-left-col { width: 320px; min-width: 280px; display: flex; flex-direction: column; }
.dm-right-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.dm-cat-tab { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; cursor: pointer; background: var(--surface); color: var(--text2); }
.dm-cat-tab.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
.dm-project-item { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: all .15s; background: var(--surface); }
.dm-project-item:hover { border-color: var(--primary); background: var(--primary-light); }
.dm-project-item .pname { font-weight: 600; font-size: 13px; color: var(--text); }
.dm-project-item .ename { font-size: 11px; color: var(--text3); margin: 2px 0; }
.dm-project-item .url { font-size: 11px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dm-project-item .meta { display: flex; gap: 8px; align-items: center; margin-top: 4px; font-size: 10px; }
.dm-method-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
.dm-method-GET { background: #dbeafe; color: #2563eb; }
.dm-method-POST { background: #d1fae5; color: #059669; }
.dm-method-PUT { background: #fef3c7; color: #d97706; }
.dm-method-DELETE { background: #fee2e2; color: #dc2626; }
.dm-method-PATCH { background: #ede9fe; color: #7c3aed; }
.dm-project-actions { display: flex; gap: 4px; margin-top: 6px; }
/* Case gen modal */
.dm-cg-item { display: flex; gap: 8px; align-items: flex-start; padding: 6px 10px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; }
.dm-cg-item:hover { background: var(--tab-hover); }
.dm-cg-item.selected { background: var(--primary-light); }
.dm-cg-item .name { font-weight: 600; }
.dm-cg-item .url { font-size: 11px; color: var(--text3); }
.dm-cg-item .meta { font-size: 10px; color: var(--text3); }
/* Run modal tabs */
.dm-run-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.dm-run-tab { padding: 6px 16px; font-size: 12px; cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text2); }
.dm-run-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.dm-run-log { background: #0d1117; color: #e6edf3; padding: 12px; font: 12px/1.6 Consolas, monospace; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin: 0; }
/* Keep toggle */
.keep-toggle { display: inline-block; position: relative; width: 40px; height: 22px; cursor: pointer; }
.keep-toggle input { display: none; }
.keep-toggle .track { display: block; width: 100%; height: 100%; background: #d1d5db; border-radius: 11px; transition: background .2s; }
.keep-toggle input:checked + .track { background: var(--primary); }
.keep-toggle .track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform .2s; }
.keep-toggle input:checked + .track::after { transform: translateX(18px); }
.el-table .cell-filename { color: var(--primary); cursor: pointer; text-decoration: underline; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>

<script>
/* ==========================================
   Section 1: Monaco Editor (lazy-load on demand)
   ========================================== */
window.__monacoReady = false;
window.__monacoPromise = null;
window.__ensureMonaco = function() {
  if (window.__monacoReady) return Promise.resolve();
  if (window.__monacoPromise) return window.__monacoPromise;
  return window.__monacoPromise = new Promise(function(resolve, reject) {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js';
    script.onload = function() {
      require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
      require(['vs/editor/editor.main'], function() {
        window.__monacoReady = true;
        resolve();
      }, reject);
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

/* ==========================================
   Section 2: App Store (Tab & State Mgmt)
   ========================================== */
const { reactive, ref, computed, watch, nextTick, onMounted, onUnmounted, shallowRef, markRaw, createApp } = Vue;
const { ElMessage, ElMessageBox } = ElementPlus;

const tabStore = reactive({
  tabs: [{ path: '/dashboard', title: '📊 总览', pinned: true }],
  addTab(path, title) {
    const existing = this.tabs.find(t => t.path === path);
    if (existing) return existing;
    const tab = { path, title, pinned: false };
    this.tabs.push(tab);
    return tab;
  },
  removeTab(path) {
    const idx = this.tabs.findIndex(t => t.path === path);
    if (idx === -1) return null;
    const tab = this.tabs[idx];
    if (tab.pinned) return null;
    this.tabs.splice(idx, 1);
    return tab;
  },
});

const routeTitleMap = {
  '/dashboard': '📊 总览',
  '/case-generate': '⚡ 接口用例生成',
  '/case-records': '📦 用例仓库',
  '/perf-test': '🚀 性能测试',
  '/danmaku-test': '🎯 弹幕压测',
  '/danmaku-ws': '🔗 弹幕长链接压测',
  '/func-gen': '📱 功能用例生成',
  '/device-manage': '📱 设备管理',
  '/task-schedule': '🤖 任务调度',
  '/allure-report': '📋 Allure 报告',
  '/test-report': '📈 测试报告',
};

/* ==========================================
   Section 3: Router Setup
   ========================================== */
const { createRouter, createWebHashHistory } = VueRouter;

/* ==========================================
   Section 4: Toast (global helper)
   ========================================== */
function showToast(msg, type) {
  const app = document.getElementById('app').__vue_app__;
  if (!app) return;
  const vm = app._instance?.proxy;
  if (!vm) return;
  vm.toast.msg = msg; vm.toast.type = type || 'success'; vm.toast.show = true;
  clearTimeout(vm.__toastTimer);
  vm.__toastTimer = setTimeout(() => { vm.toast.show = false; }, 2800);
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// ── 5.1 Dashboard ──
const DashboardPage = {
  template: `
<div class="page-body">
  <div class="page-header"><div><h2>📊 总览仪表盘</h2><p class="page-desc">AI 手游测试平台运行概览</p></div></div>
  <div class="stats-grid">
    <div class="stat-card" v-for="s in stats" :key="s.label"><div class="stat-top"><span class="stat-label">{{s.label}}</span><span class="stat-icon">{{s.icon}}</span></div><div class="stat-value">{{s.value}}</div><div :id="'mini-' + s.key" style="height:38px"></div><div class="stat-sub">{{s.sub}}</div></div>
  </div>
  <div class="card"><div class="card-header">📋 最近执行记录</div><el-table :data="recentRuns" size="small" style="width:100%"><el-table-column prop="case_name" label="用例名称"/><el-table-column prop="status" label="状态" width="100"><template #default="{row}"><el-tag :type="row.status==='passed'?'success':row.status==='failed'?'danger':'info'" size="small">{{row.status}}</el-tag></template></el-table-column><el-table-column prop="duration" label="耗时" width="100"/><el-table-column prop="run_at" label="时间" width="180"/></el-table></div>
</div>`,
  data() { return { recentRuns: [] }; },
  computed: {
    stats() { return [
      { key:'a',label:'测试用例总数',icon:'📝',value:'--',sub:'YAML 用例' },
      { key:'b',label:'今日执行',icon:'▶️',value:'--',sub:'pytest' },
      { key:'c',label:'设备在线',icon:'📱',value:'--',sub:'台' },
      { key:'d',label:'Allure报告',icon:'📋',value:'--',sub:'最新' },
    ];},
  },
  async mounted() {
    try {
      const [r1, r2] = await Promise.allSettled([
        fetch('/api/db/records?limit=10').then(r=>r.json()),
        fetch('/api/db/records/count').then(r=>r.json()),
      ]);
      if (r1.status === 'fulfilled' && r1.value && Array.isArray(r1.value.records)) {
        this.recentRuns = r1.value.records.map(r=>({case_name:r.filename||r.id,status:r.exec_status||'generated',duration:r.duration_ms||'--',run_at:r.created_at||'--'}));
      }
      if (r2.status === 'fulfilled') {
        const total = r2.value.count || r2.value.total || r2.value['count(*)'] || '--';
        const today = r2.value.today || '--';
        this.stats[0].value = total; this.stats[1].value = today;
      }
      this.stats[2].value = '16'; this.stats[3].value = '可访问';
    } catch(e) { console.warn('Dashboard fetch error:', e); }
    this.$nextTick(() => { this.stats.forEach(s => { const el = document.getElementById('mini-'+s.key); if (el && echarts) { const inst = echarts.init(el); inst.setOption({ grid:{left:0,right:0,top:2,bottom:2}, xAxis:{show:false,data:Array.from({length:24},(_,i)=>i)}, yAxis:{show:false}, series:[{type:'line',data:Array.from({length:24},()=>~~(Math.random()*30+5)),smooth:true,symbol:'none',lineStyle:{color:'#10b981',width:1.5},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(16,185,129,.25)'},{offset:1,color:'rgba(16,185,129,.02)'}])}}] },{notMerge:true}); } }); });
  },
};

const CaseGeneratePage = {

        </div>
        <el-input v-if="inputMode==='curl'" v-model="curlInput" type="textarea" rows="5" placeholder="粘贴 curl 命令，如：&#10;curl 'https://api.example.com/login' \&#10;  -H 'Content-Type: application/json' \&#10;  --data-raw '{"phone":"138****0001","code":"1111"}'" style="font-family:monospace;font-size:12px;" />
        <el-input v-if="inputMode==='text'" v-model="textInput" type="textarea" rows="5" placeholder="描述接口信息，如：&#10;POST /api/user/login&#10;参数: mobile(string,必填), code(string,必填), invite_code(string,选填)&#10;响应: {code, msg, data: {token, userId}}&#10;需要覆盖场景：正常登录、错误验证码、参数缺失、token提取" />
        <div v-if="inputMode==='image'" class="upload-zone" @click="triggerUpload" @drop.prevent="handleImageDrop" @dragover.prevent>
          <span v-if="!imagePreview">📸 点击选择截图 或 Ctrl+V 粘贴</span>
          <img v-else :src="imagePreview" alt="preview" style="max-height:160px;">
        </div>
        <input ref="fileInput" type="file" accept="image/*" style="display:none" @change="handleImageFile">

        <!-- Attached Images Strip (all modes) -->
        <div style="margin-top:6px;font-size:11px;color:var(--text3);">📎 附加截图（粘贴 / 拖拽 / 点击 +）</div>
        <div class="attach-strip-vue">
          <div v-for="(img, idx) in attachedImages" :key="idx" class="attach-thumb-vue" @click="previewAttachedImg(idx)">
            <img :src="img" alt="screenshot">
            <div class="del-badge" @click.stop="removeAttachedImg(idx)">&times;</div>
          </div>
          <div class="attach-add-vue" @click="$refs.attachInput.click()" title="添加截图">+</div>
          <span class="hint-text" v-if="attachedImages.length === 0">Ctrl+V 粘贴，或拖拽图片到此处</span>
        </div>
        <input ref="attachInput" type="file" accept="image/*" multiple style="display:none" @change="handleAttachFile">

        <div class="toolbar" style="margin-top:8px;">
          <el-checkbox v-model="normalizeAsserts" size="small">标准化断言</el-checkbox>
          <el-button @click="clearAll" size="small">🗑️ 清空</el-button>
          <el-button type="primary" size="small" @click="doGenerate" :loading="generating">⚡ 生成 YAML</el-button>
        </div>
      </div>
    </div>

    <!-- Right: Summary + YAML Output + Console -->
    <div class="split-right">
      <!-- Summary Card -->
      <div class="card" style="max-height:100px;">
        <div class="card-header">
          📋 生成摘要
          <span class="model-tag-vue" v-if="currentResult.model">{{ currentResult.model }}</span>
          <el-button size="small" style="margin-left:auto;padding:3px 10px;font-size:11px;" @click="showHistoryModal = true">📜 历史 ({{ history.length }})</el-button>
        </div>
        <div class="summary-box-vue">{{ currentResult.summary || '等待生成...' }}</div>
      </div>

      <!-- YAML Output Card -->
      <div class="card" style="flex:1;display:flex;flex-direction:column;">
        <div class="card-header" style="display:flex;align-items:center;gap:8px;">
          📄 YAML 输出
          <span style="color:var(--primary);font-size:11px;" v-if="statusText">{{ statusText }}</span>
          <el-button size="small" style="margin-left:auto;" @click="toggleRaw">查看{{ rawMode ? '精简' : '原文' }}</el-button>
        </div>
        <div class="code-editor-wrap" ref="editorContainer" style="flex:1;min-height:200px;">
          <div v-if="!monacoLoaded" class="editor-placeholder">加载编辑器中...</div>
        </div>
        <div class="toolbar" style="margin-top:4px;flex-wrap:wrap;">
          <el-button size="small" @click="copyYaml" :disabled="!currentResult.yaml && !currentResult.raw">📋 复制 YAML</el-button>
          <el-button size="small" @click="downloadYaml" :disabled="!currentResult.yaml && !currentResult.raw">💾 下载 .yaml</el-button>
          <el-button size="small" @click="downloadRawYaml" :disabled="!currentResult.raw">📄 下载原文</el-button>
          <el-button size="small" type="success" @click="doExecute" :disabled="!currentResult.yaml && !currentResult.raw" :loading="executing">🚀 执行用例</el-button>
          <el-button size="small" type="warning" @click="doAiAssert" :disabled="!currentResult.yaml && !currentResult.raw" :loading="asserting">🤖 AI断言</el-button>
        </div>
      </div>

      <!-- Console Output Panel -->
      <div class="console-panel-vue" v-if="consoleCollapsed !== undefined">
        <div class="console-header-vue" @click="toggleConsoleCollapse">
          🖥️ 控制台
          <span class="btns">
            <button @click.stop="clearConsole" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;">清空</button>
            <button @click.stop="copyConsole" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;">复制</button>
            <span style="font-size:11px;color:var(--text3);">▼</span>
          </span>
        </div>
        <div class="console-body-vue" ref="consoleBody" v-show="!consoleCollapsed" v-html="consoleHtml"></div>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <el-dialog v-model="showHistoryModal" title="📜 生成历史" width="700px" top="5vh">
    <table class="history-modal-table" v-if="history.length > 0">
      <thead><tr><th style="width:140px">时间</th><th>模型</th><th>摘要</th><th>操作</th></tr></thead>
      <tbody>
        <tr v-for="(h, i) in history" :key="i" class="history-row">
          <td style="font-size:11px;color:var(--text3);">{{ h.time }}</td>
          <td style="font-size:11px;">{{ h.model || '-' }}</td>
          <td style="font-size:12px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ h.summary || '-' }}</td>
          <td><el-button size="small" @click="restoreHistory(i);showHistoryModal=false;">📋 恢复</el-button></td>
        </tr>
      </tbody>
    </table>
    <div v-else style="text-align:center;color:var(--text3);padding:20px;">暂无历史记录</div>
  </el-dialog>
</div>`,
  data() {
    return {
      inputMode: 'curl', curlInput: '', textInput: '',
      imagePreview: '', imageFile: null,
      attachedImages: [],
      normalizeAsserts: false, generating: false,
      executing: false, asserting: false,
      yamlContent: '', monacoLoaded: false, editor: null,
      currentResult: { summary: '', yaml: '', raw: '', model: '', yaml_body: '' },
      history: [], rawMode: false, statusText: '',
      showHistoryModal: false,
      consoleHtml: '', consoleCollapsed: undefined,
      dbPath: '', dbCountText: '',
    };
  },
  mounted() {
    console.log('[mounted] CaseGeneratePage mounted');
    window.ensureMonacoLoaded().then(() => { 
      console.log('[mounted] Monaco loaded');
      this.monacoLoaded = true; 
      this.$nextTick(() => this.initEditor()); 
    });
    document.addEventListener('paste', this._pasteHandler);
    document.addEventListener('keydown', this._keydownHandler);
    // Drag for attached images on the whole input card
    this.$nextTick(() => {
      const card = this.$el?.querySelector('.card');
      if (card) {
        card.addEventListener('dragover', e => { e.preventDefault(); });
        card.addEventListener('drop', e => {
          e.preventDefault();
          [...e.dataTransfer.files].forEach(f => { if (f.type.startsWith('image/')) this.addAttachedFile(f); });
        });
      }
    });
    this.loadDbConfig();
  },
  beforeUnmount() {
    document.removeEventListener('paste', this._pasteHandler);
    document.removeEventListener('keydown', this._keydownHandler);
    if (this.editor) this.editor.dispose();
  },
  methods: {
    initEditor() {
      console.log('[initEditor] editorContainer exists:', !!this.$refs.editorContainer, 'editor exists:', !!this.editor);
      if (this.editor || !this.$refs.editorContainer) return;
      this.editor = monaco.editor.create(this.$refs.editorContainer, {
        value: this.yamlContent || '',
        language: 'yaml', theme: 'vs-dark', fontSize: 12, minimap: { enabled: false },
        automaticLayout: true, readOnly: false, lineNumbers: 'on',
        scrollBeyondLastLine: false, wordWrap: 'on',
      });
      console.log('[initEditor] editor created:', !!this.editor);
    },
    setEditorValue(v) {
      console.log('[setEditorValue] editor exists:', !!this.editor, 'value length:', (v || '').length);
      if (this.editor) this.editor.setValue(v || '');
      else this.yamlContent = v || '';
    },
    getEditorValue() {
      return this.editor ? this.editor.getValue() : (this.yamlContent || '');
    },
    triggerUpload() { this.$refs.fileInput.click(); },
    handleImageFile(e) {
      const f = e.target.files[0]; if (!f) return;
      this.imageFile = f;
      const r = new FileReader(); r.onload = () => { this.imagePreview = r.result; this.addAttachedImageByData(r.result); }; r.readAsDataURL(f);
    },
    handleImageDrop(e) {
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) {
        this.imageFile = f;
        const r = new FileReader(); r.onload = () => { this.imagePreview = r.result; this.addAttachedImageByData(r.result); }; r.readAsDataURL(f);
      }
    },
    handleAttachFile(e) {
      [...e.target.files].forEach(f => this.addAttachedFile(f));
      e.target.value = '';
    },
    addAttachedFile(f) {
      if (!f.type.startsWith('image/')) return;
      const r = new FileReader(); r.onload = () => this.addAttachedImageByData(r.result); r.readAsDataURL(f);
    },
    addAttachedImageByData(dataUrl) {
      if (this.attachedImages.includes(dataUrl)) return;
      this.attachedImages.push(dataUrl);
    },
    removeAttachedImg(idx) {
      this.attachedImages.splice(idx, 1);
      if (this.imagePreview && !this.attachedImages.includes(this.imagePreview)) {
        this.imagePreview = ''; this.imageFile = null;
      }
    },
    previewAttachedImg(idx) {
      const url = this.attachedImages[idx];
      const w = window.open('', '_blank');
      w.document.write('<html><body style="margin:0;display:flex;align-items:center;justify-content:center;background:#000;min-height:100vh;"><img src="'+url+'" style="max-width:100%;max-height:100vh;"></body></html>');
    },
    _pasteHandler(e) {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const blob = item.getAsFile();
          const reader = new FileReader();
          reader.onload = () => this.addAttachedImageByData(reader.result);
          reader.readAsDataURL(blob);
          break;
        }
      }
    },
    _keydownHandler(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault(); this.doGenerate();
      }
    },
    getInputContent() {
      if (this.inputMode === 'curl') return this.curlInput.trim();
      if (this.inputMode === 'text') return this.textInput.trim();
      return '';
    },
    async doGenerate() {
      let type = this.inputMode;
      let content = type === 'curl' ? this.curlInput.trim() : type === 'text' ? this.textInput.trim() : '';
      const allImages = [...this.attachedImages];
      if (type === 'image' && this.imagePreview && !allImages.includes(this.imagePreview)) {
        allImages.unshift(this.imagePreview);
      }
      if (!content && allImages.length === 0) { showToast('请输入内容或附加截图', 'warning'); return; }
      if (!content && allImages.length > 0) { type = 'image'; content = allImages[0] || ''; }

      this.generating = true;
      try {
        const resp = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type, content,
            images: allImages.length > 0 ? allImages : undefined,
            normalize_asserts: this.normalizeAsserts
          }),
        });
        const data = await resp.json();
        console.log('[doGenerate] response:', { success: data.success, summary: data.summary, yaml_body_length: (data.yaml_body || '').length });
        if (!resp.ok) throw new Error(data.error || data.message || '生成失败');

        this.currentResult = {
          summary: data.summary || '',
          yaml: data.yaml_body || data.yaml || '',
          raw: data.yaml || '',
          model: data.model || '',
          yaml_body: data.yaml_body || '',
        };
        console.log('[doGenerate] currentResult:', { summary: this.currentResult.summary, yaml_length: this.currentResult.yaml.length });
        const toShow = this.rawMode ? (this.currentResult.raw || '') : (this.currentResult.yaml || '');
        console.log('[doGenerate] toShow length:', toShow.length);
        this.setEditorValue(toShow);
        this.statusText = data.success ? '✓ 生成成功' : '✗ 生成失败';
        this.addHistory();
        this.loadDbCount();
        showToast('生成成功！', 'success');
      } catch(e) {
        this.setEditorValue('错误: ' + e.message);
        this.statusText = '✗ 失败';
        showToast(e.message, 'error');
      } finally { this.generating = false; }
    },
    addHistory() {
      this.history.unshift({ ...this.currentResult, time: new Date().toLocaleString() });
      if (this.history.length > 20) this.history.length = 20;
    },
    restoreHistory(idx) {
      const h = this.history[idx];
      if (h) {
        this.currentResult = { ...h };
        const toShow = this.rawMode ? (h.raw || '') : (h.yaml || '');
        this.setEditorValue(toShow);
        this.statusText = '';
        showToast('已恢复历史记录', 'success');
      }
    },
    toggleRaw() {
      this.rawMode = !this.rawMode;
      const v = this.rawMode ? (this.currentResult.raw || '') : (this.currentResult.yaml || '');
      this.setEditorValue(v);
      showToast(this.rawMode ? '已切换为原文模式' : '已切换为精简模式', 'info');
    },
    copyYaml() {
      const v = this.getEditorValue();
      if (!v) { showToast('无内容可复制', 'warning'); return; }
      navigator.clipboard.writeText(v).then(() => showToast('已复制', 'success')).catch(() => showToast('复制失败', 'error'));
    },
    downloadYaml() {
      const v = this.getEditorValue();
      if (!v) { showToast('无内容可下载', 'warning'); return; }
      const b = new Blob([v], { type: 'text/yaml;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'test_case.yaml'; a.click(); URL.revokeObjectURL(a.href);
    },
    downloadRawYaml() {
      const v = this.currentResult.raw || '';
      if (!v) { showToast('无原文内容可下载', 'warning'); return; }
      const b = new Blob([v], { type: 'text/yaml;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'test_case_raw.yaml'; a.click(); URL.revokeObjectURL(a.href);
    },
    clearAll() {
      this.curlInput = ''; this.textInput = '';
      this.imagePreview = ''; this.imageFile = null;
      this.attachedImages = [];
      this.currentResult = { summary: '', yaml: '', raw: '', model: '', yaml_body: '' };
      this.setEditorValue('');
      this.statusText = ''; this.consoleHtml = '';
    },
    async doExecute() {
      const yamlBody = this.getEditorValue();
      if (!yamlBody) { showToast('请先生成 YAML 用例', 'warning'); return; }
      this.executing = true;
      this.setConsole('<span class="c-info">⏳ 正在保存 YAML → 生成测试文件 → 执行用例...</span>');

      const summary = this.currentResult.summary || 'auto_case';
      const filename = summary.replace(/[\\/:*?"<>|]/g, '').substring(0, 30) || 'auto_yaml_case';

      try {
        const resp = await fetch('/api/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            yaml_body: yamlBody, filename,
            input_type: this.inputMode,
            input_content: this.getInputContent(),
            summary: this.currentResult.summary,
            model: this.currentResult.model,
          }),
        });
        const data = await resp.json();

        if (data.success) {
          let html = '<span class="c-ok">✅ 执行完成 (返回码: ' + (data.pytest_rc || 0) + ')</span>\n';
          html += '<span class="c-dim">YAML: ' + escapeHtml(data.yaml_file || '') + ' | 测试: ' + escapeHtml(data.test_file || '') + '</span>\n';
          if (data.report_url) html += '<a href="' + data.report_url + '" target="_blank" style="color:#1890ff;">📊 打开 Allure 报告 →</a>\n';
          html += '\n<span style="color:#fff;font-weight:600;">── stdout ──</span>\n';
          html += '<span class="c-dim">' + escapeHtml(data.stdout || '(空)') + '</span>\n';
          if (data.stderr) {
            html += '\n<span class="c-warn">── stderr ──</span>\n';
            html += '<span class="c-warn">' + escapeHtml(data.stderr) + '</span>\n';
          }
          this.appendConsole(html);
          showToast('用例执行完成', 'success');
          this.loadDbCount();
        } else {
          let html = '<span class="c-err">❌ 执行失败</span>\n';
          html += '<span class="c-err">' + escapeHtml(data.error || '未知错误') + '</span>\n';
          if (data.stderr) html += '<span class="c-warn">' + escapeHtml(data.stderr) + '</span>\n';
          this.appendConsole(html);
          showToast('执行失败: ' + (data.error || '未知错误'), 'error');
        }
      } catch(e) {
        this.appendConsole('<span class="c-err">❌ 网络错误: ' + escapeHtml(e.message) + '</span>');
        showToast('网络错误', 'error');
      } finally { this.executing = false; }
    },
    async doAiAssert() {
      const yamlBody = this.getEditorValue();
      if (!yamlBody) { showToast('请先生成 YAML 用例', 'warning'); return; }
      this.asserting = true;
      this.setConsole('<span class="c-info">⏳ AI 正在分析响应结果...</span>');

      try {
        const resp = await fetch('/api/ai_assert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ yaml_body: yamlBody, normalize_asserts: this.normalizeAsserts }),
        });
        const data = await resp.json();

        if (data.results) {
          const ok = data.status === '通过';
          const icon = ok ? '✅' : '❌';
          let html = '<span class="' + (ok ? 'c-ok' : 'c-err') + '" style="font-size:14px;font-weight:600;">' + icon + ' AI断言结果: ' + escapeHtml(data.summary || '') + '</span>\n';
          html += '<hr class="c-hr">\n';
          data.results.forEach(r => {
            const ok2 = r.status === '通过';
            const i2 = ok2 ? '✅' : r.status === '错误' ? '⚠️' : '❌';
            const cls = ok2 ? 'c-ok' : 'c-err';
            html += '<span class="' + cls + '">' + i2 + ' <b>' + escapeHtml(r.case_id) + '</b> — HTTP ' + (r.response_code || '-') + '</span>\n';
            html += '<span class="c-dim">  断言: ' + escapeHtml(r.assert_desc || '-') + '</span>\n';
            html += '<span>  💡 ' + escapeHtml(r.reason) + '</span>\n';
          });
          this.appendConsole(html);
          showToast('AI断言完成: ' + (data.summary || ''), ok ? 'success' : 'error');
        } else {
          this.appendConsole('<span class="c-err">❌ ' + escapeHtml(data.error || 'AI断言失败') + '</span>');
          showToast('AI断言失败', 'error');
        }
      } catch(e) {
        this.appendConsole('<span class="c-err">❌ 网络错误: ' + escapeHtml(e.message) + '</span>');
        showToast('网络错误', 'error');
      } finally { this.asserting = false; }
    },
    setConsole(html) { this.consoleHtml = html; this.consoleCollapsed = false; this.scrollConsoleTop(); },
    appendConsole(html) {
      this.consoleHtml += (this.consoleHtml ? '\n' : '') + html;
      this.consoleCollapsed = false;
      this.$nextTick(() => { const b = this.$refs.consoleBody; if (b) b.scrollTop = b.scrollHeight; });
    },
    scrollConsoleTop() {
      this.$nextTick(() => { const b = this.$refs.consoleBody; if (b) b.scrollTop = 0; });
    },
    toggleConsoleCollapse() { this.consoleCollapsed = !this.consoleCollapsed; },
    clearConsole() { this.consoleHtml = ''; },
    copyConsole() {
      const b = this.$refs.consoleBody;
      const text = b ? (b.innerText || b.textContent) : this.consoleHtml;
      navigator.clipboard.writeText(text).then(() => showToast('日志已复制', 'success')).catch(() => showToast('复制失败', 'error'));
    },
    async loadDbConfig() {
      try {
        const r = await fetch('/api/db/config');
        const d = await r.json();
        if (d.db_path) this.dbPath = d.db_path;
      } catch(e) {}
    },
    async loadDbCount() {
      try {
        const r = await fetch('/api/db/records?limit=1');
        const d = await r.json();
        this.dbCountText = d.count ? '(' + d.count + ' 条记录)' : '';
        if (d.count) this.dbCountText = '(共 ' + d.count + ' 条记录)';
      } catch(e) {}
    },
    async saveDbPath() {
      if (!this.dbPath.trim()) { showToast('请输入数据库路径', 'warning'); return; }
      try {
        const r = await fetch('/api/db/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ db_path: this.dbPath.trim() }),
        });
        const d = await r.json();
        if (d.success) { showToast('数据库路径已更新', 'success'); this.loadDbCount(); }
        else showToast('设置失败: ' + (d.error || ''), 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    },
  },
};

/* ==========================================
   5.3 Case Records — Fully Rebuilt
   Adds: search, count, refresh, full table with exec_status tag,
         keep_flag toggle, filename→modal, re-execute
   ========================================== */
const CaseRecordsPage = {
  template: `
<div class="page-body">
  <div class="page-header">
    <div><h2>📦 用例仓库</h2><p class="page-desc">管理已生成的测试用例</p></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
    <span style="font-weight:600;">🗄️ 用例仓库</span>
    <el-input v-model="search" placeholder="搜索文件名或摘要..." size="small" style="width:220px" clearable @input="onSearch"/>
    <span style="font-size:12px;color:var(--text3);" id="records-count">共 {{ allRecords.length }} 条</span>
    <el-button size="small" @click="loadRecords" :loading="loading">🔄 刷新</el-button>
  </div>
  <div class="card" v-if="!loading && filtered.length === 0" style="text-align:center;color:var(--text3);padding:40px;">
    {{ allRecords.length === 0 ? '暂无记录' : '无匹配记录' }}
  </div>
  <div class="card" v-else>
    <el-table :data="filtered" size="small" stripe style="width:100%" max-height="calc(100vh - 240px)" v-loading="loading">
      <el-table-column prop="id" label="#" width="60" />

      const total = this.totalReqs;

      const bodyStr = this.perfBody.trim();

      const latencies = [];
      let completed = 0, success = 0, failed = 0;
      const startTime = performance.now();

      const fetchOpts = { method, headers };
      if (['POST', 'PUT', 'PATCH'].includes(method) && bodyStr) {

      if (latencies.length > 0) latencies.sort((a, b) => a - b);
      const pctFn = (pct) => latencies.length > 0 ? latencies[Math.min(Math.floor(latencies.length * pct / 100), latencies.length - 1)] : 0;
      const avg = latencies.length > 0 ? Math.round(latencies.reduce((a, b) => a + b, 0) / latencies.length) : 0;

    },
  },
};

  data() {
    return {
      dmAllProjects: [], dmActiveCat: '', dmFormDisabled: false, dmEditId: null, dmViewMode: false,
      dmFormTitle: '📝 新增弹幕项目',
      dmForm: { category: '默认', newCat: '', project_name: '', endpoint_name: '', endpoint_url: '', method: 'GET', headers: [{ key: 'Content-Type', value: 'application/json' }], body: '' },
      dmPerfVisible: false, dmPerfId: null, dmPerfName: '',
      dmPerfConcurrency: 5, dmPerfTotal: 50, dmPerfRunning: false, dmPerfProgress: 0,
      dmPerfMetrics: { total: '-', ok: '-', err: '-', tps: '-' },
      dmPerfLatency: { avg: '-', p50: '-', p90: '-', p95: '-', p99: '-', min: '-', max: '-' },
      dmErrorLogs: [],
      dmConsoleShown: true, dmConsoleLogData: '',
      // Case gen
      showCgModal: false, dmCgAll: [], dmCgSelected: new Set(), dmCgCats: [],
      dmCgFilterCatActive: '', dmCgNormalize: false, dmCgGenerating: null,
      // YAML modal
      showCgYamlModal: false, dmCgYaml: '', dmCgYamlTag: '', dmCgYamlStatus: '', dmCgYamlStatusOk: true,
      dmCgExecuting: false, dmCgAsserting: false, dmCgMode: '', dmCgSummary: '',
      dmStressRunning: false,
      // Run modal
      showRunModal: false, dmRunTitle: '', dmRunLog: '', dmRunReportUrl: 'about:blank',
      dmRunStatusCls: 'idle', dmRunStatusText: '空闲', dmRunPane: 'log',
      dmStressRunId: null, dmStressReader: null, dmStressPaused: false,
    };
  },
  computed: {
    dmCategories() { return [...new Set(this.dmAllProjects.map(p => p.project_category || '默认'))]; },
    filteredProjects() {
      return this.dmActiveCat ? this.dmAllProjects.filter(p => (p.project_category || '默认') === this.dmActiveCat) : this.dmAllProjects;
    },
    dmCgFiltered() {
      const items = this.dmCgAll.filter(p => p.endpoint_url && p.endpoint_url.trim());
      return this.dmCgFilterCatActive ? items.filter(p => (p.endpoint_category || p.category || '').trim() === this.dmCgFilterCatActive) : items;
    },
  },
  async mounted() { await this.loadProjects(); },
  methods: {
    async loadProjects() {
      try {
        const r = await fetch('/api/danmaku/projects');
        const d = await r.json();
        if (d.success) this.dmAllProjects = d.items || [];
        else showToast('加载失败: ' + (d.error || ''), 'error');
      } catch(e) { showToast('加载异常: ' + e.message, 'error'); }
    },
    showNewForm() {
      this.dmEditId = null; this.dmViewMode = false; this.dmFormDisabled = false;
      this.dmFormTitle = '📝 新增弹幕项目';
      this.dmForm = { category: '默认', newCat: '', project_name: '', endpoint_name: '', endpoint_url: '', method: 'GET', headers: [{ key: 'Content-Type', value: 'application/json' }, { key: 'User-Agent', value: 'UnityPlayer/2023.1.13f1 (UnityWebRequest/1.0, libcurl/8.1.1-DEV)' }, { key: 'X-Unity-Version', value: '2023.1.13f1' }], body: '' };
      this.dmPerfVisible = false;
    },
    editDmProject(item) {
      this.dmEditId = item.id; this.dmViewMode = false; this.dmFormDisabled = false;
      this.dmFormTitle = '✏ 编辑弹幕项目 (#' + item.id + ')';
      let headers = item.headers;
      if (typeof headers === 'string') { try { headers = JSON.parse(headers); } catch(e) { headers = {}; } }
      const hArr = headers && typeof headers === 'object' ? Object.entries(headers).map(([k,v]) => ({ key: k, value: v })) : [{ key: '', value: '' }];
      this.dmForm = {
        category: item.project_category || '默认', newCat: '',
        project_name: item.project_name || '', endpoint_name: item.endpoint_name || '',
        endpoint_url: item.endpoint_url || '', method: item.method || 'GET',
        headers: hArr, body: item.body || ''
      };
      this.dmPerfVisible = false;
    },
    viewDmProject(item) {
      this.editDmProject(item);
      this.dmViewMode = true; this.dmFormDisabled = true;
      this.dmFormTitle = '🔒 查看接口详情 (#' + item.id + ')';
    },
    getDmHeadersObj() {
      const h = {};
      this.dmForm.headers.forEach(row => { if (row.key.trim()) h[row.key.trim()] = row.value; });
      return h;
    },
    async saveDmProject() {
      if (this.dmViewMode) { this.dmFormDisabled = false; this.dmViewMode = false; return; }
      const { project_name, endpoint_name, endpoint_url, method, body, category, newCat } = this.dmForm;
      if (!project_name.trim()) { showToast('请输入项目名称', 'warning'); return; }
      if (!endpoint_name.trim()) { showToast('请输入接口名称', 'warning'); return; }
      if (!endpoint_url.trim()) { showToast('请输入接口地址', 'warning'); return; }
      const payload = {
        project_name: project_name.trim(), endpoint_name: endpoint_name.trim(),
        endpoint_url: endpoint_url.trim(),
        project_category: newCat.trim() || category,
        method, headers: this.getDmHeadersObj(), body: body.trim()
      };
      try {
        const url = this.dmEditId ? '/api/danmaku/projects/' + this.dmEditId : '/api/danmaku/projects';
        const meth = this.dmEditId ? 'PUT' : 'POST';
        const r = await fetch(url, { method: meth, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const d = await r.json();
        if (d.success) { showToast(this.dmEditId ? '已更新' : '已保存', 'success'); this.showNewForm(); await this.loadProjects(); }
        else showToast(d.error || '保存失败', 'error');
      } catch(e) { showToast('保存异常: ' + e.message, 'error'); }
    },
    async deleteDmProject(item) {
      try {
        await ElMessageBox.confirm('确定删除？', '确认', { type: 'warning' });
        const r = await fetch('/api/danmaku/projects/' + item.id, { method: 'DELETE' });
        const d = await r.json();
        if (d.success) { showToast('已删除', 'success'); await this.loadProjects(); }
        else showToast(d.error || '删除失败', 'error');
      } catch(e) { /* cancelled */ }
    },
    runDmPerf(item) {
      this.dmPerfVisible = true; this.dmPerfId = item.id; this.dmPerfName = item.endpoint_name || item.project_name;
      this.dmPerfMetrics = { total: '-', ok: '-', err: '-', tps: '-' };
      this.dmPerfLatency = { avg: '-', p50: '-', p90: '-', p95: '-', p99: '-', min: '-', max: '-' };
      this.dmPerfProgress = 0; this.dmErrorLogs = [];
    },
    async doDmPerf() {
      if (!this.dmPerfId) return;
      this.dmPerfRunning = true;
      const progressTimer = setInterval(() => { if (this.dmPerfProgress < 90) this.dmPerfProgress += 3; }, 200);
      try {
        const r = await fetch('/api/danmaku/perf/' + this.dmPerfId, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ concurrency: this.dmPerfConcurrency, total_req: this.dmPerfTotal })
        });
        const d = await r.json();
        clearInterval(progressTimer);
        this.dmPerfProgress = 100;
        if (d.success) {
          this.dmPerfMetrics.total = d.completed; this.dmPerfMetrics.ok = d.ok; this.dmPerfMetrics.err = d.errors; this.dmPerfMetrics.tps = d.tps;
          const l = d.latency || {};
          this.dmPerfLatency.avg = l.avg + ' ms'; this.dmPerfLatency.p50 = l.p50 + ' ms';
          this.dmPerfLatency.p90 = l.p90 + ' ms'; this.dmPerfLatency.p95 = l.p95 + ' ms';
          this.dmPerfLatency.p99 = l.p99 + ' ms'; this.dmPerfLatency.min = l.min + ' ms'; this.dmPerfLatency.max = l.max + ' ms';
          this.dmErrorLogs = (d.error_logs || []).map(e => ({
            idx: e.idx, status: e.status, error: e.error, body: e.body
          }));
        } else showToast(d.error || '压测失败', 'error');
      } catch(e) { clearInterval(progressTimer); showToast('压测异常: ' + e.message, 'error'); }
      this.dmPerfRunning = false;
    },
    dmConsoleLog(type, msg, detail) {
      if (!this.dmConsoleShown) return;
      const t = new Date().toLocaleTimeString();
      const colors = { ok: '#27ae60', err: '#e74c3c', info: '#3498db', warn: '#e67e22', req: '#9b59b6' };
      const icons = { ok: '✅', err: '❌', info: 'ℹ️', warn: '⚠️', req: '📤' };
      let html = '<div style="margin-bottom:4px;"><span style="color:#666;">' + t + '</span> <span style="color:' + (colors[type] || '#ccc') + ';">' + (icons[type] || '➜') + ' ' + escapeHtml(msg) + '</span>';
      if (detail) html += '<div style="color:#8b949e;margin:2px 0 0 16px;white-space:pre-wrap;word-break:break-all;">' + escapeHtml(detail) + '</div>';
      html += '</div>';
      this.dmConsoleLogData += html;
      this.$nextTick(() => { const el = this.$refs.dmConsoleBody; if (el) el.scrollTop = el.scrollHeight; });
    },
    // Case generation
    async showCaseGenModal() {
      this.showCgModal = true; this.dmCgSelected = new Set(); this.dmCgFilterCatActive = '';
      this.dmCgNormalize = false;
      try {
        const r = await fetch('/api/danmaku/projects');
        const d = await r.json();
        this.dmCgAll = (d.items || []).filter(p => p.endpoint_url && p.endpoint_url.trim());
        const catSet = new Set();
        this.dmCgAll.forEach(p => { const c = (p.endpoint_category || p.category || '').trim(); if (c) catSet.add(c); });
        this.dmCgCats = [...catSet];
      } catch(e) {}
    },
    dmCgFilterCat(cat) { this.dmCgFilterCatActive = (this.dmCgFilterCatActive === cat) ? '' : cat; },
    dmCgToggle(id) { if (this.dmCgSelected.has(id)) this.dmCgSelected.delete(id); else this.dmCgSelected.add(id); },
    dmCgSelectAll(val) {
      const list = this.dmCgFiltered;
      if (val) list.forEach(p => this.dmCgSelected.add(p.id));
      else list.forEach(p => this.dmCgSelected.delete(p.id));
    },
    async doDmCaseGenerate(mode) {
      this.dmCgGenerating = mode;
      this.dmCgMode = mode;
      try {
        const r = await fetch('/api/danmaku/case/generate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: [...this.dmCgSelected], mode, normalize_assert: this.dmCgNormalize }),
        });
        const d = await r.json();
        if (!d.success) { showToast('生成失败: ' + (d.error || '?'), 'error'); return; }
        this.dmCgYaml = d.yaml || ''; this.dmCgSummary = d.summary || ('danmaku_' + mode);
        this.dmCgYamlTag = d.count ? (' ' + d.count + ' 接口 · ' + mode.toUpperCase()) : (' ' + mode.toUpperCase());
        this.dmCgYamlStatus = '生成成功' + (d.model ? ' (' + d.model + ')' : ''); this.dmCgYamlStatusOk = true;
        this.showCgYamlModal = true; this.showCgModal = false;
      } catch(e) { showToast('生成异常: ' + e.message, 'error'); }
      finally { this.dmCgGenerating = null; }
    },
    dmCgCopyYaml() {
      const t = this.dmCgYaml || '';
      navigator.clipboard.writeText(t).then(() => showToast('已复制', 'success'));
    },
    dmCgDownloadYaml() {
      const blob = new Blob([this.dmCgYaml], { type: 'text/yaml;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (this.dmCgSummary || 'case').replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_') + '.yaml';
      a.click(); URL.revokeObjectURL(a.href);
    },
    openRunModal() {
      this.showRunModal = true; this.runPane = 'log';
      this.dmRunLog = '等待开始...'; this.dmRunReportUrl = 'about:blank';
      this.dmRunStatusCls = 'running'; this.dmRunStatusText = '▶️ 运行中';
      this.dmStressRunId = null; this.dmStressReader = null; this.dmStressPaused = false;
      this.dmRunTitle = this.dmCgSummary || '';
    },
    async doDmCaseExecute() {
      const yamlBody = this.dmCgYaml;
      if (!yamlBody) { showToast('YAML 为空', 'error'); return; }
      this.dmCgExecuting = true; this.openRunModal();
      this.dmRunLog = '正在保存 YAML 并启动 pytest...\n';
      try {
        const r = await fetch('/api/danmaku/case/run', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ yaml_body: yamlBody, summary: this.dmCgSummary, model: 'danmaku_' + this.dmCgMode }),
        });
        const d = await r.json();
        if (d.success) {
          this.dmRunLog += (d.stdout || '') + '\n' + (d.stderr || '') + '\n';
          this.dmRunLog += '\n' + (d.pytest_rc === 0 ? '✅ 所有用例通过' : '❌ 有失败用例 (exit ' + d.pytest_rc + ')') + '\n';
          if (d.report_url) {
            this.dmRunLog += 'Allure 报告: ' + d.report_url + '\n';
            this.dmRunReportUrl = d.report_url + '?t=' + Date.now();
          }
          this.dmRunStatusCls = d.pytest_rc === 0 ? 'ok' : 'err';
          this.dmRunStatusText = d.pytest_rc === 0 ? '✅ 通过' : '❌ 失败';
        } else {
          this.dmRunLog += '执行失败: ' + (d.error || '未知错误') + '\n';
          this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 失败';
        }
      } catch(e) { this.dmRunLog += '请求异常: ' + e.message + '\n'; this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 异常'; }
      this.dmCgExecuting = false;
    },
    async doDmCaseAiAssert() {
      const yamlBody = this.dmCgYaml;
      if (!yamlBody) { showToast('YAML 为空', 'error'); return; }
      this.dmCgAsserting = true;
      this.showCgYamlModal = false;
      this.openRunModal();
      this.dmRunLog = '>>> AI 断言任务启动\n>>> 发送 YAML 到 /api/danmaku/case/ai-assert...\n\n';
      try {
        const r = await fetch('/api/danmaku/case/ai-assert', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ yaml_body: yamlBody, normalize_asserts: this.dmCgNormalize }),
        });
        const d = await r.json();
        if (d.success) {
          if (d.yaml) this.dmCgYaml = d.yaml;
          this.dmCgYamlStatus = 'AI 断言生成成功'; this.dmCgYamlStatusOk = true;
          this.dmRunLog += '✓ AI 断言生成成功\n  生成模式: ' + (d.mode || this.dmCgMode) + '\n';
          this.dmRunLog += '  耗时: ' + (d.elapsed || '?') + 's\n';
          this.dmRunLog += '--- AI 原始输出 ---\n' + (d.log || '(无)') + '\n';
          this.dmRunStatusCls = 'ok'; this.dmRunStatusText = '✅ 断言完成';
          setTimeout(() => { this.showCgYamlModal = true; this.showRunModal = false; showToast('AI 断言已写入 YAML', 'success'); }, 800);
        } else {
          this.dmRunLog += '✗ AI 断言失败: ' + (d.error || '?') + '\n';
          if (d.log) this.dmRunLog += '\n--- AI 输出 ---\n' + d.log + '\n';
          if (d.traceback) this.dmRunLog += '\n--- 堆栈 ---\n' + d.traceback + '\n';
          this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 失败';
          showToast('AI 断言失败', 'error');
        }
      } catch(e) { this.dmRunLog += '请求异常: ' + e.message + '\n'; this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 异常'; }
      this.dmCgAsserting = false;
    },
    async doDmStressRun() {
      const yamlBody = this.dmCgYaml;
      if (!yamlBody) { showToast('YAML 为空', 'error'); return; }
      this.dmStressRunning = true; this.openRunModal();
      this.dmRunLog = '>>> 开始压测，请等待...\n\n';
      this.dmStressRunId = null; this.dmStressPaused = false;
      try {
        const r = await fetch('/api/danmaku/stress/run', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ yaml_body: yamlBody }),
        });
        if (!r.ok) {
          const txt = await r.text();
          this.dmRunLog += '请求异常 [HTTP ' + r.status + ']: ' + txt.slice(0, 300) + '\n';
          this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 异常';
        } else {
          this.dmStressReader = r.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          while (true) {
            const { done, value } = await this.dmStressReader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop() || '';
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const raw = line.slice(6).trim();
              if (!raw || raw === '[DONE]') continue;
              let ev;
              try { ev = JSON.parse(raw); } catch { continue; }
              if (ev.run_id) { this.dmStressRunId = ev.run_id; continue; }
              if (ev.error) { this.dmRunLog += '❌ 错误: ' + ev.error + '\n'; this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 异常'; continue; }
              if (ev.cancelled) { this.dmRunLog += '\n⏹ 压测已终止\n'; this.dmRunStatusCls = 'err'; this.dmRunStatusText = '⏹ 已终止'; continue; }
              if (ev.paused) { this.dmRunLog += '\n⏸ 压测已暂停...\n'; this.dmStressPaused = true; this.dmRunStatusText = '⏸ 已暂停'; continue; }
              if (ev.resumed) { this.dmRunLog += '⏵ 压测已恢复\n'; this.dmStressPaused = false; this.dmRunStatusText = '▶️ 运行中'; continue; }
              if (ev.done != null && ev.item) {
                const item = ev.item; const m = item.metrics || {};
                const icon = item.pass ? '✅' : '❌';
                this.dmRunLog += '\n' + '─'.repeat(50) + '\n';
                this.dmRunLog += icon + ' ' + item.name + '\n';
                this.dmRunLog += '  并发:' + item.concurrency + ' 持续:' + item.duration + 's 耗时:' + item.elapsed + 's\n';
                this.dmRunLog += '  请求:' + m.total + ' 成功:' + m.success + ' 失败:' + m.failed + '\n';
                this.dmRunLog += '  TPS:' + m.tps + ' avg:' + m.avg_rt + 'ms P50:' + m.p50 + 'ms P90:' + m.p90 + 'ms P99:' + m.p99 + 'ms\n';
                if (item.assertions && item.assertions.length > 0) {
                  this.dmRunLog += '  断言:\n';
                  for (const a of item.assertions) {
                    this.dmRunLog += '    ' + (a.passed ? '✓' : '✗') + ' ' + a.name + ': ' + a.actual + ' ' + a.op + ' ' + a.expected;
                    if (a.reason) this.dmRunLog += ' (' + a.reason + ')';
                    this.dmRunLog += '\n';
                  }
                }
              }
              if (ev.done === true) {
                const allPass = ev.summary && ev.summary.every(r2 => r2.pass);
                this.dmRunLog += '\n' + (allPass ? '✅ 全部通过' : '❌ 存在失败') + '\n';
                this.dmRunStatusCls = allPass ? 'ok' : 'err'; this.dmRunStatusText = allPass ? '✅ 通过' : '❌ 失败';
              }
            }
          }
        }
      } catch(e) { this.dmRunLog += '请求异常: ' + e.message + '\n'; this.dmRunStatusCls = 'err'; this.dmRunStatusText = '❌ 异常'; }
      this.dmStressRunId = null; this.dmStressReader = null; this.dmStressRunning = false;
    },
    async doDmStressStop() { if (this.dmStressRunId) { try { await fetch('/api/danmaku/stress/cancel', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({run_id:this.dmStressRunId}) }); } catch(e){} } if (this.dmStressReader) { try { this.dmStressReader.cancel(); } catch(e){} } },
    async doDmStressPause() { if (this.dmStressRunId) { try { await fetch('/api/danmaku/stress/pause', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({run_id:this.dmStressRunId}) }); } catch(e){} } },
    async doDmStressResume() { if (this.dmStressRunId) { try { await fetch('/api/danmaku/stress/resume', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({run_id:this.dmStressRunId}) }); } catch(e){} } },
  },
};

      dmWsPerfVisible: false, dmWsPerfId: null, dmWsPerfName: '',

      dmWsPerfMetrics: { total: '-', ok: '-', failed: '-', tps: '-' },
      dmWsPerfLatency: { avg: '-', p50: '-', p90: '-', p95: '-', p99: '-', min: '-', max: '-' },

    getDmWsHeadersObj() {

    presetDy() {

    presetKs() {

      this.dmWsForm.endpoint_url = 'https://ks.danmaku.example.com/register';

    async saveDmWsProject() {
      if (this.dmWsViewMode) { this.dmWsFormDisabled = false; this.dmWsViewMode = false; return; }
      const { project_name, endpoint_name, endpoint_url, method, body, category, newCat } = this.dmWsForm;
      if (!project_name.trim()) { showToast('请输入项目名称', 'warning'); return; }
      if (!endpoint_name.trim()) { showToast('请输入接口名称', 'warning'); return; }
      if (!endpoint_url.trim()) { showToast('请输入接口地址', 'warning'); return; }
      const payload = {
        project_name: project_name.trim(), endpoint_name: endpoint_name.trim(),
        endpoint_url: endpoint_url.trim(),
        project_category: newCat.trim() || category,
        method, headers: this.getDmWsHeadersObj(), body: body.trim()
      };
      try {
        const url = this.dmWsEditId ? '/api/danmaku/ws-projects/' + this.dmWsEditId : '/api/danmaku/ws-projects';
        const meth = this.dmWsEditId ? 'PUT' : 'POST';
        const r = await fetch(url, { method: meth, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const d = await r.json();
        if (d.success) { showToast(this.dmWsEditId ? '已更新' : '已保存', 'success'); this.showNewWsForm(); await this.loadWsProjects(); }
        else showToast(d.error || '保存失败', 'error');
      } catch(e) { showToast('保存异常: ' + e.message, 'error'); }
    },
    async deleteDmWsProject(item) {
      try {
        await ElMessageBox.confirm('确定删除？', '确认', { type: 'warning' });
        const r = await fetch('/api/danmaku/ws-projects/' + item.id, { method: 'DELETE' });
        const d = await r.json();
        if (d.success) { showToast('已删除', 'success'); await this.loadWsProjects(); }
        else showToast(d.error || '删除失败', 'error');
      } catch(e) { /* cancelled */ }
    },
    runDmWsPerf(item) {
      this.dmWsPerfVisible = true; this.dmWsPerfId = item.id; this.dmWsPerfName = item.endpoint_name || item.project_name;
      this.dmWsPerfMetrics = { total: '-', ok: '-', failed: '-', tps: '-' };
      this.dmWsPerfLatency = { avg: '-', p50: '-', p90: '-', p95: '-', p99: '-', min: '-', max: '-' };
      this.dmWsStageLatency = { login: '- ms', ws_connect: '- ms', auth: '- ms', create_room: '- ms' };
      this.dmWsPerfProgress = 0;
    },
    async doDmWsPerf() {
      if (!this.dmWsPerfId) return;
      this.dmWsPerfRunning = true;
      const progressTimer = setInterval(() => { if (this.dmWsPerfProgress < 90) this.dmWsPerfProgress += 3; }, 300);
      try {
        const r = await fetch('/api/danmaku/ws-perf', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: this.dmWsPerfId, concurrency: this.dmWsPerfConcurrency, timeout_sec: this.dmWsPerfTimeout })
        });
        const d = await r.json();
        clearInterval(progressTimer);
        this.dmWsPerfProgress = 100;
        if (d.success) {
          this.dmWsPerfMetrics.total = d.total; this.dmWsPerfMetrics.ok = d.ok; this.dmWsPerfMetrics.failed = d.failed; this.dmWsPerfMetrics.tps = d.tps;
          const l = d.latency || {};
          this.dmWsPerfLatency.avg = l.avg + ' ms'; this.dmWsPerfLatency.p50 = l.p50 + ' ms';
          this.dmWsPerfLatency.p90 = l.p90 + ' ms'; this.dmWsPerfLatency.p95 = l.p95 + ' ms';
          this.dmWsPerfLatency.p99 = l.p99 + ' ms'; this.dmWsPerfLatency.min = l.min + ' ms'; this.dmWsPerfLatency.max = l.max + ' ms';
          const s = d.stage_breakdown || {};
          const stageMap = { login: 'login', ws_connect: 'ws_connect', auth: 'auth', create_room: 'create_room' };
          for (const [key, elKey] of Object.entries(stageMap)) {
            const info = s[key] || {};
            this.dmWsStageLatency[elKey] = 'avg:' + (info.avg || 0) + ' / p50:' + (info.p50 || 0) + ' / min:' + (info.min || 0) + ' / max:' + (info.max || 0) + ' ms';
          }
        } else showToast(d.error || '压测失败', 'error');
      } catch(e) { clearInterval(progressTimer); showToast('压测异常: ' + e.message, 'error'); }
      this.dmWsPerfRunning = false;
    },
  },
};

const FuncGenPage = {
  template: `
<div class="page-body">

    </div>

  </div>
</div>`,
  data() { return { funcPreview:'',imgList: [], funcFile:null, funcDesc:'', funcYaml:'' , generating: false}; },
  mounted() { document.addEventListener('paste', this.pasteHandle); },
  beforeUnmount() { document.removeEventListener('paste', this.pasteHandle); },
  methods: {
    triggerUpload(){this.$refs.funcFileInput.click();},
    // 选择本地图片
    handleFile(e){const f=e.target.files[0];if(f){this.funcFile=f;const r=new FileReader();r.onload=()=>{this.funcPreview=r.result;};r.readAsDataURL(f);}},
    // 拖拽图片
    handleDrop(e){const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){this.funcFile=f;const r=new FileReader();r.onload=()=>{this.funcPreview=r.result;};r.readAsDataURL(f);}},
    _paste(e){const items=e.clipboardData?.items;if(!items)return;for(const item of items){if(item.type.startsWith('image/')){this.funcFile=item.getAsFile();const r=new FileReader();r.onload=()=>{this.funcPreview=r.result;};r.readAsDataURL(this.funcFile);break;}}},
    funcClear(){this.funcPreview='';this.funcFile=null;this.funcDesc='';},
    async funcGenerate(){if(!this.funcFile&&!this.funcDesc){showToast('请上传截图或输入描述','warning');return;}try{const fd=new FormData();fd.append('type','image');fd.append('content',this.funcDesc);if(this.funcFile)fd.append('images',this.funcFile);const r=await fetch('/api/generate',{method:'POST',body:fd});const d=await r.json();if(!r.ok)throw new Error(d.error||'生成失败');this.funcYaml=d.yaml||d.result||'';showToast('生成成功','success');}catch(e){showToast(e.message,'error');}},
    copyFuncYaml(){navigator.clipboard.writeText(this.funcYaml).then(()=>showToast('已复制','success'));},
    downloadFuncYaml(){const b=new Blob([this.funcYaml],{type:'text/yaml'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='func_case.yaml';a.click();},
  },
};

const DeviceManagePage = {
  template: `<div class="page-body"><div ref="containerEl"></div></div>`,
  // Bug 修复：原 data() 返回 containerEl: null，会与模板 ref="containerEl" 冲突，
  // 导致 $refs.containerEl 在 mounted 阶段变成 null，loadTemplate() 死循环重试，
  // 子 Vue 应用永远不挂载。删除该字段，让 Vue 从模板自动收集 ref。
  data() {
    return { _loaded: false, _pageApp: null, _ws: null };
  },
  mounted() { this.loadTemplate(); },
  beforeUnmount() {
    if (this._ws) { try { this._ws.close(); } catch(e) {} }
    if (this._resizeHandler) window.removeEventListener('resize', this._resizeHandler);
  },
  methods: {
    async loadTemplate() {
      if (this._loaded) return;
      const el = this.$refs.containerEl;
      if (!el) {
        // 防御性：最多重试 20 次（1秒），仍找不到则给出明确错误
        this._retryCount = (this._retryCount || 0) + 1;
        if (this._retryCount > 20) {
          console.error('[DeviceManagePage] containerEl 不存在，已重试 20 次');
          el && (el.innerHTML = '<div style="padding:40px;text-align:center;color:#f87171">容器未就绪，请刷新</div>');
          return;
        }
        setTimeout(() => this.loadTemplate(), 50);
        return;
      }
      this._retryCount = 0;
      try {
        const html = await fetch('views/devices/devices.html').then(r => r.text());
        if (!document.getElementById('devices-css')) {
          const link = document.createElement('link');
          link.id = 'devices-css';
          link.rel = 'stylesheet';
          link.href = 'views/devices/devices.css?v=' + Date.now();
          document.head.appendChild(link);
        }
        el.innerHTML = html;
        this._loaded = true;
        console.log('[DeviceManagePage] 模板已加载，开始挂载子应用');
        this.$nextTick(() => this.initPage());
      } catch (e) {
        console.error('[DeviceManagePage] 加载失败:', e);
        el.innerHTML = '<div style="padding:40px;text-align:center;color:#f87171">模板加载失败: ' + e.message + '</div>';
      }
    },
    initPage() {
      if (this._pageApp) return;
      const { createApp, ref, reactive, computed, watch, onMounted, onBeforeUnmount, nextTick } = Vue;
      const self = this;
      const page = createApp({
        setup() {
          const devices = ref([]);
          const loading = ref(true);
          const loadError = ref('');
          const searchText = ref('');
          const filterType = ref('');
          const filterStatus = ref('');
          const filterGroup = ref('');
          const onlySelected = ref(false);
          const selectedIds = ref([]);
          const batchMenuOpen = ref(false);
          const syncing = ref(false);
          const utilOpen = ref(false);
          const utilRate = ref(0);
          const busyCount = ref(0);
          const faultCount = ref(0);
          const onlineCount = ref(0);
          const statsData = ref(null);
          const utilization = ref(null);

          const remoteDevice = ref(null);
          const remoteCanvasW = ref(360);
          const remoteCanvasH = ref(640);
          const remoteTool = ref('tap');
          const wsConnected = ref(false);
          const wsConnecting = ref(false);
          const wsFps = ref(0);
          const wsLastFrame = ref(0);
          let _ws = null;
          let _frameCount = 0;
          let _lastFpsT = Date.now();
          let _renderImg = null;
          let _mouseStart = null;

          const perfDevice = ref(null);
          const perfFpsRef = ref(null);
          const perfTempRef = ref(null);
          const perfCpuRef = ref(null);

          const textInputShow = ref(false);
          const textInputValue = ref('');

          // 补丁：远程控制增强（scrcpy 风格弹窗所需）
          const showLogPanel = ref(false);
          const remoteDialogVisible = ref(false);
          const sessionInfo = reactive({ session_id: '', codec: 'JPEG q40', fps: 0 });

          const toast = ref({ show: false, msg: '', type: 'success' });

                {key:'fault',label:'故障',icon:'[!]',value:0,sub:''},
                {key:'real',label:'真机',icon:'[R]',value:0,sub:''},
                {key:'emu',label:'模拟器',icon:'[E]',value:0,sub:''},
                {key:'android',label:'安卓',icon:'[A]',value:0,sub:''},
                {key:'ios',label:'iOS',icon:'[I]',value:0,sub:''},

            loadDevices().then(() => { onlineCount.value = devices.value.filter(d => d.status === 'online').length; }).catch(e => showToast(e.message, 'error'));

            if (stat.key === 'all')      { filterStatus.value = null; filterType.value = null; }

            else if (stat.key === 'emu')  { filterType.value = '模拟器'; filterStatus.value = null; }

            try {
              const d = await api('/api/devices/sync', { method: 'POST' });
              showToast(d.msg || '同步完成', 'success');
              await refreshAll();
            } catch (e) { showToast(e.message, 'error'); }
            finally { syncing.value = false; }
          }

          function setTool(t) { remoteTool.value = t; }
          function openRemote(d) {
            if (d.status === 'offline') { showToast('设备离线', 'error'); return; }
            if (d.status === 'busy')    { showToast('设备被占用中', 'warn'); return; }
            remoteDevice.value = d;
            connectWs(d.serial);
          }
          function closeRemote() {
            if (_ws) { try { _ws.close(); } catch(e) {} _ws = null; }
            wsConnected.value = false; wsConnecting.value = false;
            remoteDevice.value = null;
          }
          function connectWs(serial) {
            if (_ws) { try { _ws.close(); } catch(e) {} }
            wsConnecting.value = true; wsConnected.value = false;
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            const url = `${proto}://${location.hostname}:8090/`;
            try { _ws = new WebSocket(url); }
            catch (e) { showToast('WS 创建失败: ' + e.message, 'error'); return; }
            _ws.onopen = () => {
              wsConnecting.value = false; wsConnected.value = true;
              _ws.send(JSON.stringify({ action: 'init_device', device_serial: serial }));
            };
            _ws.onmessage = (ev) => {
              try {
                const data = JSON.parse(ev.data);
                if (data.screen_base64) drawFrame(data.screen_base64);
                if (data.error) showToast(data.error, 'error', 3000);
                if (data.msg) showToast(data.msg, 'success', 1500);
                _frameCount++;
                const now = Date.now();
                if (now - _lastFpsT > 1000) {
                  wsFps.value = _frameCount;
                  _frameCount = 0; _lastFpsT = now;
                  wsLastFrame.value = now;
                }
              } catch(e) {}
            };
            _ws.onerror = () => { wsConnecting.value = false; showToast('WS 连接失败', 'error'); };
            _ws.onclose = () => { wsConnected.value = false; wsConnecting.value = false; };
          }
          function reconnectWs() {
            if (remoteDevice.value) connectWs(remoteDevice.value.serial);
          }
          function drawFrame(b64) {
            const cv = document.querySelector('.dm-remote-screen canvas');
            if (!cv) return;
            if (!_renderImg) _renderImg = new Image();
            _renderImg.onload = () => {
              const ctx = cv.getContext('2d');
              if (cv.width !== _renderImg.width || cv.height !== _renderImg.height) {
                cv.width = _renderImg.width;
                cv.height = _renderImg.height;
                remoteCanvasW.value = _renderImg.width;
                remoteCanvasH.value = _renderImg.height;
              }
              ctx.drawImage(_renderImg, 0, 0);
            };
            _renderImg.src = 'data:image/jpeg;base64,' + b64;
          }

          function eventToXY(ev) {
            const cv = ev.target;
            const rect = cv.getBoundingClientRect();
            return {
              x: Math.round((ev.clientX - rect.left) * (cv.width / rect.width)),
              y: Math.round((ev.clientY - rect.top) * (cv.height / rect.height)),
            };
          }
          function onMouseDown(ev) { _mouseStart = eventToXY(ev); }
          function onMouseMove(ev) {}
          function onMouseUp(ev) {
            if (!_mouseStart || !_ws || _ws.readyState !== 1) { _mouseStart = null; return; }
            const start = _mouseStart;
            const end = eventToXY(ev);
            _mouseStart = null;
            if (remoteTool.value === 'tap') {
              if (Math.abs(end.x - start.x) > 5 || Math.abs(end.y - start.y) > 5) return;
              _ws.send(JSON.stringify({ action: 'tap', x: end.x, y: end.y }));
            } else if (remoteTool.value === 'swipe') {
              _ws.send(JSON.stringify({
                action: 'swipe', x1: start.x, y1: start.y,
                x2: end.x, y2: end.y, duration: 300,
              }));
            }
          }
          function sendKey(k) {
            if (!_ws || _ws.readyState !== 1) { showToast('未连接', 'error'); return; }
            _ws.send(JSON.stringify({ action: 'key', key: k }));
          }
          function takeScreenshot() {
            const cv = document.querySelector('.dm-remote-screen canvas');
            if (!cv) return;
            const url = cv.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url; a.download = 'device_' + Date.now() + '.png';
            a.click();
            showToast('截屏已保存', 'success');
          }
          function sendText() { textInputValue.value = ''; textInputShow.value = true; }
          function confirmSendText() {
            if (!_ws || _ws.readyState !== 1) { showToast('未连接', 'error'); return; }
            _ws.send(JSON.stringify({ action: 'input_text', text: textInputValue.value }));
            textInputShow.value = false;
            showToast('已发送', 'success');
          }

          async function openPerf(d) {
            perfDevice.value = d;
            await nextTick();
            await loadPerf(d.id);
          }
          async function loadPerf(id) {
            try {
              const d = await api('/api/devices/perf/' + id);
              drawPerfCharts(d.data);
            } catch (e) { showToast(e.message, 'error'); }
          }
          function closePerf() { perfDevice.value = null; }
          function _ensureChart(el, opt) {
            if (!el || !window.echarts) return;
            let inst = window.echarts.getInstanceByDom(el);
            if (!inst) inst = window.echarts.init(el);
            inst.setOption(opt, { notMerge: true });
          }
          function drawPerfCharts(data) {
            const t = data.timestamps || [];
            const mkOpt = (vals, color) => ({
              grid: { left: 40, right: 15, top: 20, bottom: 25 },
              tooltip: { trigger: 'axis' },
              xAxis: { type: 'category', data: t, axisLabel: { fontSize: 10, color: '#94a3b8' } },
              yAxis: { type: 'value', axisLabel: { fontSize: 10, color: '#94a3b8' } },
              series: [{ type: 'line', data: vals, smooth: true, symbol: 'none',
                lineStyle: { color, width: 2 },
                areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                  colorStops: [{offset:0,color:color + '55'},{offset:1,color:color + '11'}] } }
              }],
            });
            if (perfFpsRef.value)  _ensureChart(perfFpsRef.value,  mkOpt(data.fps,  '#10b981'));
            if (perfTempRef.value) _ensureChart(perfTempRef.value, mkOpt(data.temp, '#ef4444'));
            if (perfCpuRef.value)  _ensureChart(perfCpuRef.value,  mkOpt(data.cpu,  '#3b82f6'));
          }

          function drawMiniCharts() {
            if (!window.echarts) return;
            statsCards.value.forEach(s => {
              const el = document.querySelector('[data-stat-key="' + s.key + '"] .dm-mini-chart');
              if (!el) return;
              const data = Array.from({length: 24}, () => Math.floor(Math.random() * 20 + 8));
              _ensureChart(el, {
                grid: { left: 0, right: 0, top: 2, bottom: 2 },
                xAxis: { show: false, data: data.map((_,i) => i) },
                yAxis: { show: false },
                series: [{ type: 'line', data, smooth: true, symbol: 'none',
                  lineStyle: { color: '#10b981', width: 1.5 },
                  areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                    colorStops: [{offset:0,color:'rgba(16,185,129,.3)'},{offset:1,color:'rgba(16,185,129,.02)'}] } }
                }],
              });
            });
          }
          function drawUtilCharts() {
            if (!window.echarts || !utilization.value) return;
            const pieEl = document.querySelector('[data-util-pie]');
            const trendEl = document.querySelector('[data-util-trend]');
            if (pieEl) _ensureChart(pieEl, {
              tooltip: { trigger: 'item' },
              legend: { textStyle: { color: '#cbd5e1' }, bottom: 0 },
              series: [{ type: 'pie', radius: ['40%', '70%'],
                data: utilization.value, 
                label: { color: '#cbd5e1' } }],
            });
            if (trendEl) _ensureChart(trendEl, {
              tooltip: { trigger: 'axis' },
              legend: { textStyle: { color: '#cbd5e1' } },
              grid: { left: 40, right: 15, top: 30, bottom: 25 },
              xAxis: { type: 'category', data: utilization.value.trend.map(t => t.date), axisLabel: { color: '#94a3b8' } },
              yAxis: { type: 'value', axisLabel: { color: '#94a3b8' } },
              series: [
                { name: 'AI 手游', type: 'line', data: utilization.value.trend.map(t => t.game), smooth: true, lineStyle: { color: '#7c3aed' } },
                { name: '普通 App', type: 'line', data: utilization.value.trend.map(t => t.app), smooth: true, lineStyle: { color: '#3b82f6' } },
              ],
            });
          }

          function statusText(s) {
            return ({online:'在线空闲', busy:'任务占用', offline:'离线', fault:'故障告警'})[s] || s;
          }
          function badgeClass(d) {
            if (d.group === '手游专用组') return 'mobile';
            if (d.group === '模拟器组') return 'emu';
            return 'normal';
          }

          const _resizeHandler = () => { drawMiniCharts(); drawUtilCharts(); };
          window.addEventListener('resize', _resizeHandler);

          onMounted(refreshAll);
          onBeforeUnmount(() => {
            window.removeEventListener('resize', _resizeHandler);
            if (_ws) { try { _ws.close(); } catch(e) {} }
          });

          return {
            devices, loading, loadError, searchText, filterType, filterStatus,
            filterGroup, onlySelected, selectedIds, batchMenuOpen, syncing,
            utilOpen, utilRate, busyCount, faultCount, onlineCount,
            filteredDevices, statsCards,
            remoteDevice, remoteCanvasW, remoteCanvasH, remoteTool,
            wsConnected, wsConnecting, wsFps, wsLastFrame,
            perfDevice, perfFpsRef, perfTempRef, perfCpuRef,
            textInputShow, textInputValue, toast,
            applyFilters, onStatClick, isSelected, toggleSelect, clearSelection,
            closeBatchMenu, batchOp, exportDevices, syncAdbDevices, refreshAll,
            setTool, openRemote, closeRemote, connectWs, reconnectWs, onMouseDown, onMouseMove, onMouseUp,
            sendKey, takeScreenshot, sendText, confirmSendText,
            openPerf, closePerf,
            statusText, badgeClass,
            // 远程控制增强
            showLogPanel, remoteDialogVisible, sessionInfo, remoteLogs, releaseAndClose, pushLog,
          };
        },
      });
      this._pageApp = page;
      this._ws = null;
      const mountEl = this.$refs.containerEl.querySelector('#app-devices');
      if (mountEl) {
        page.mount(mountEl);
        console.log('[DeviceManagePage] 子应用已挂载到 #app-devices');
      } else {
        console.error('[DeviceManagePage] #app-devices not found，devices.html 可能未加载');
      }
    },
  },
};

/* ==========================================
   Section 4: App & Mount
   ========================================== */
const app = Vue.createApp({
  data() {
    return {
      sidebarCollapsed: false,
      currentRoute: '',
      tabs: [],
      cachedViewNames: [],
      toast: { show: false, msg: '', type: 'success' },
    };
  },
  computed: {
    activeTab() { return this.tabs.find(t => t.path === this.currentRoute) || null; },
    openedTabs() { return this.tabs; },
    activeMenu() { return this.currentRoute || '/dashboard'; },
    showDanmakuWs() { return ['danmaku-ws','danmaku-test'].includes(this.currentRoute.replace('/','')); },
  },
  watch: {
    $route: { immediate: true, handler(to) { if (to) { this.currentRoute = to.path; this.addTab(to); } } },
  },
  methods: {
    addTab(route) {
      if (!route.meta || !route.meta.title) return;
      const p = route.path;
      if (p === '/' || p === '/dashboard') return;
      const exists = this.tabs.find(t => t.path === p);
      if (exists) return;
      this.tabs.push({ path: p, title: route.meta.title, closable: true });
    },
    closeTab(path) {
      const idx = this.tabs.findIndex(t => t.path === path);
      if (idx < 0) return;
      this.tabs.splice(idx, 1);
      if (path === this.currentRoute) {
        const target = this.tabs[idx] || this.tabs[this.tabs.length - 1] || { path: '/dashboard' };
        this.$router.push(target.path);
      }
    },
    toggleSidebar() { this.sidebarCollapsed = !this.sidebarCollapsed; },
    navTo(path) {
      if (path.startsWith('http')) { window.open(path, '_blank'); return; }
      this.$router.push(path);
    },
    isActive(path) {
      return this.currentRoute === path || (path !== '/' && this.currentRoute.startsWith(path));
    },
    onMenuSelect(index) { this.$router.push(index); },
    switchTab(path) { this.$router.push(path); },
  },
  created() {
    // Clear tabs on full page reload
    if (!window.__VUE_APP_INITIALIZED) {
      window.__VUE_APP_INITIALIZED = true;
    }
  },
});

app.use(router);

        binding.value(e);
      }
    };
    document.addEventListener('click', el.__clickOutside);
  },
  unmounted(el) { document.removeEventListener('click', el.__clickOutside); },
});
app.config.globalProperties.$ELEMENT = { size: 'small' };

const vm = app.mount('#app');

// Monaco lazy loader

  if (window.__monacoPromise) return window.__monacoPromise;
  window.__monacoPromise = new Promise((resolve) => {
    if (window.monaco) { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js';
    script.onload = () => {
      require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' } });
      require(['vs/editor/editor.main'], resolve);
    };
    document.head.appendChild(script);
  });
  return window.__monacoPromise;
};
