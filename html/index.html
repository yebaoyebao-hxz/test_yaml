<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML 测试用例生成器</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- 引入顶部导航 -->
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <div id="header-container"></div>
  <!-- 引入顶层页签 -->
  <div id="tabs-container"></div>
  <!-- 引入所有视图 -->
  <div id="views-container"></div>

  <script>
    // 加载组件和视图
    $(function() {
      // 加载顶部导航
      $('#header-container').load('components/header.html');
      // 加载页签
      $('#tabs-container').load('components/page-tabs.html', function() {
        // 页签切换逻辑
        $('.page-tab').click(function() {
          $('.page-tab').removeClass('active');
          $(this).addClass('active');
          const viewId = $(this).data('view') + '-view';
          $('.view-section').addClass('hidden');
          $('#' + viewId).removeClass('hidden');
        });
      });
      // 加载所有视图
      $('#views-container').load('views/records-view.html', function() {
        $('#views-container').append($('<div>').load('views/perf-view.html'));
        $('#views-container').append($('<div>').load('views/danmaku-view.html'));
        $('#views-container').append($('<div>').load('views/proto-view.html'));
        $('#views-container').append($('<div>').load('views/binary-view.html'));
        $('#views-container').append($('<div>').load('views/ai-panel.html'));
      });

      // 性能测试滑块逻辑
      $(document).on('input', '#concurrency-slider', function() {
        $('#concurrency-val').text($(this).val());
      });
      $(document).on('input', '#duration-slider', function() {
        $('#duration-val').text($(this).val());
      });

      // 性能测试模式切换
      $(document).on('click', '.mode-btn', function() {
        $('.mode-btn').removeClass('active');
        $(this).addClass('active');
        const mode = $(this).data('mode');
        if (mode === 'ws') {
          $('.http-only').hide();
          $('.ws-only').addClass('show');
        } else {
          $('.ws-only').removeClass('show');
          $('.http-only').show();
        }
      });

      // 添加请求头
      $(document).on('click', '#add-header', function() {
        const headerItem = `
          <div class="perf-header-item">
            <input type="text" placeholder="Key">
            <input type="text" placeholder="Value">
            <button class="btn-remove">×</button>
          </div>
        `;
        $('.perf-header-list').append(headerItem);
      });

      // 删除请求头
      $(document).on('click', '.perf-header-item .btn-remove', function() {
        $(this).parent().remove();
      });

      // Proto文件上传逻辑
      $(document).on('click', '#proto-upload-area', function() {
        $('#proto-file-input').click();
      });
      $(document).on('change', '#proto-file-input', function(e) {
        const files = e.target.files;
        if (files.length > 0) {
          const fileList = $('#proto-file-list');
          fileList.empty();
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fileSize = (file.size / 1024).toFixed(1) + ' KB';
            const fileItem = `
              <div class="proto-file-item">
                <div class="name">${file.name}</div>
                <div class="size">${fileSize}</div>
                <div class="btn-remove">×</div>
              </div>
            `;
            fileList.append(fileItem);
          }
        }
      });
      // 删除Proto文件
      $(document).on('click', '.proto-file-item .btn-remove', function() {
        $(this).parent().remove();
      });
      // 解析Proto文件
      $(document).on('click', '.proto-parse-btn', function() {
        $('#proto-parse-result').show();
        // 模拟解析结果
        $('#proto-parse-result pre').text(`
syntax = "proto3";
package example;

message Danmaku {
  string content = 1; // 弹幕内容
  int64 uid = 2;      // 用户ID
  int32 timestamp = 3;// 发送时间戳
}

service DanmakuService {
  rpc SendDanmaku (Danmaku) returns (Response);
}

message Response {
  int32 code = 1;
  string msg = 2;
}
        `);
      });

      // 二进制数据可视化逻辑
      $(document).on('click', '#binary-parse-btn', function() {
        // 模拟解析逻辑（实际需实现Base64/16进制转二进制）
        const input = $('#binary-input').val();
        // 这里仅做示例渲染
        const visualArea = $('#binary-visual-area');
        visualArea.empty();
        const row = `
          <div class="binary-hex-row">
            <span class="binary-offset-col">0000</span>
            <span class="binary-hex-col">48</span>
            <span class="binary-hex-col">65</span>
            <span class="binary-hex-col">6C</span>
            <span class="binary-hex-col">6C</span>
            <span class="binary-hex-col">6F</span>
            <span class="binary-hex-col">20</span>
            <span class="binary-hex-col">57</span>
            <span class="binary-hex-col">6F</span>
            <span class="binary-hex-col">72</span>
            <span class="binary-hex-col">6C</span>
            <span class="binary-hex-col">64</span>
            <span class="binary-hex-col">21</span>
            <span class="binary-ascii-col">H</span>
            <span class="binary-ascii-col">e</span>
            <span class="binary-ascii-col">l</span>
            <span class="binary-ascii-col">l</span>
            <span class="binary-ascii-col">o</span>
            <span class="binary-ascii-col"> </span>
            <span class="binary-ascii-col">W</span>
            <span class="binary-ascii-col">o</span>
            <span class="binary-ascii-col">r</span>
            <span class="binary-ascii-col">l</span>
            <span class="binary-ascii-col">d</span>
            <span class="binary-ascii-col">!</span>
          </div>
        `;
        visualArea.append(row);
      });

      // AI交互面板逻辑
      $(document).on('click', '#ai-send-btn', function() {
        const inputVal = $('#ai-input').val().trim();
        if (!inputVal) return;
        // 添加用户消息
        const userMsg = `
          <div class="ai-message user">
            <div class="ai-avatar">👤</div>
            <div class="ai-content">${inputVal}</div>
          </div>
        `;
        $('#ai-chat-area').append(userMsg);
        $('#ai-input').val('');
        // 模拟AI回复
        setTimeout(() => {
          const aiMsg = `
            <div class="ai-message assistant">
              <div class="ai-avatar">🤖</div>
              <div class="ai-content">以下是你请求的YAML测试用例示例：
${'```yaml'}
test_case:
  name: HTTP POST接口测试
  method: POST
  url: https://api.example.com/test
  headers:
    Content-Type: application/json
  body:
    key1: value1
    key2: value2
  expected_code: 200
  expected_response:
    code: 0
    msg: success
${'```'}
              </div>
            </div>
          `;
          $('#ai-chat-area').append(aiMsg);
          // 滚动到底部
          $('#ai-chat-area').scrollTop($('#ai-chat-area')[0].scrollHeight);
        }, 800);
      });

      // 压测按钮切换（开始/停止）
      $(document).on('click', '.btn-perf-run', function() {
        $(this).prop('disabled', true);
        $(this).siblings('.btn-perf-stop').show();
        // 模拟进度条
        let progress = 0;
        const progressBar = $(this).closest('.perf-btn-row').siblings('.perf-progress').find('.perf-progress-bar');
        const interval = setInterval(() => {
          progress += 10;
          progressBar.css('width', progress + '%');
          if (progress >= 100) {
            clearInterval(interval);
            $(this).prop('disabled', false);
            $(this).siblings('.btn-perf-stop').hide();
            progressBar.css('width', '0%');
          }
        }, 500);
      });
      $(document).on('click', '.btn-perf-stop', function() {
        $(this).hide();
        $(this).siblings('.btn-perf-run').prop('disabled', false);
        const progressBar = $(this).closest('.perf-btn-row').siblings('.perf-progress').find('.perf-progress-bar');
        progressBar.css('width', '0%');
        clearInterval(window.progressInterval);
      });
    });
  </script>
</body>
</html>
