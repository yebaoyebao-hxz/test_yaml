<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>YAML 测试用例生成器</title>
  <!-- 引入公共样式 -->
  <link rel="stylesheet" href="./common/common.css">
  <!-- 引入各视图样式 -->
  <link rel="stylesheet" href="./views/records/records.css">
  <link rel="stylesheet" href="./views/perf/perf.css">
  <link rel="stylesheet" href="./views/danmaku/danmaku.css">
</head>
<body>
  <!-- 引入顶部导航 -->
  <div id="header-container"></div>
  <!-- 引入顶层页签 -->
  <div id="page-tabs-container"></div>

  <!-- 加载模块的JS（原生方式加载HTML模块） -->
  <script>
    // 加载公共组件
    fetch('./common/header.html').then(res => res.text()).then(html => {
      document.getElementById('header-container').innerHTML = html;
    });
    fetch('./common/page-tabs.html').then(res => res.text()).then(html => {
      document.getElementById('page-tabs-container').innerHTML = html;

      // 加载各视图内容
      fetch('./views/records/records.html').then(res => res.text()).then(html => {
        document.getElementById('view-records').innerHTML = html;
      });
      fetch('./views/perf/perf.html').then(res => res.text()).then(html => {
        document.getElementById('view-perf').innerHTML = html;
      });
      fetch('./views/danmaku/danmaku.html').then(res => res.text()).then(html => {
        document.getElementById('view-danmaku').innerHTML = html;
      });

      // 页签切换逻辑
      document.querySelectorAll('.page-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          // 移除所有active
          document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
          // 激活当前tab和视图
          tab.classList.add('active');
          const viewId = `view-${tab.dataset.view}`;
          document.getElementById(viewId).classList.remove('hidden');
        });
      });
    });
  </script>
</body>
</html>
