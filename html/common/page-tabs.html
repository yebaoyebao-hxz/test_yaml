<div class="view-section" id="view-generate"></div>
<div class="view-section hidden" id="view-records"></div>
<div class="view-section hidden" id="view-perf"></div>
<div class="view-section hidden" id="view-danmaku"></div>
<div class="view-section hidden" id="view-danmaku-ws"></div>

<div class="console-panel" id="console-panel" style="display:none;">
  <div class="console-header" id="console-header">
    <span>📋 运行日志</span>
    <span style="flex:1"></span>
    <button class="btn btn-outline console-btn" onclick="clearConsole()" title="清空">🗑 清空</button>
    <button class="btn btn-outline console-btn" onclick="copyConsole()" title="复制全部">📋 复制</button>
    <button class="btn btn-outline console-btn" id="console-toggle-btn" onclick="toggleConsoleCollapse()" title="收起/展开">▲ 收起</button>
  </div>
  <div class="console-body" id="console-body"></div>
</div>

<div class="modal-overlay hidden" id="record-modal">
  <div class="modal-box">
    <div class="modal-header">
      📄 <span id="modal-title">用例详情</span>
      <button class="modal-close" onclick="closeRecordModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>📝 YAML 用例</h3>
        <div class="modal-yaml-box">
          <textarea id="modal-yaml" readonly spellcheck="false" placeholder="加载中..."></textarea>
        </div>
      </div>
      <div class="modal-section">
        <h3>📊 Allure 报告</h3>
        <div class="modal-report-box" id="modal-report-box">
          <div class="modal-report-empty" id="modal-report-empty">暂无报告</div>
          <iframe class="modal-report-iframe" id="modal-report-iframe" style="display:none;"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
