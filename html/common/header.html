<div class="header">
  <span class="logo">🐇</span>
  <h1>花仙子科技AI测试平台</h1>
  <span class="sub">AI 驱动 · DeepSeek / 通义千问</span>
</div>

<div class="page-tabs">
  <button class="page-tab active" data-page="generate" onclick="switchPage('generate')">⚡ 接口用例生成</button>
  <button class="page-tab" data-page="records" onclick="switchPage('records')">📦 用例仓库</button>
  <button class="page-tab" data-page="perf" onclick="switchPage('perf')">🚀 性能测试</button>
  <button class="page-tab" data-page="danmaku" onclick="switchPage('danmaku')">🎯 弹幕压测</button>
  <button class="page-tab" data-page="danmaku-ws" onclick="switchPage('danmaku-ws')">🔗 弹幕长链接压测</button>
  <button class="page-tab" data-page="devices" onclick="switchPage('devices')">📱 设备管理</button>
</div>

<div id="view-generate" class="view-section">
<div class="db-bar">
  <span>🗄️ 数据库:</span>
  <input id="db-path" placeholder="E:\\yebao\\test_yaml\\history.db" title="SQLite 数据库路径，留空使用默认">
  <button class="btn btn-outline" onclick="setDbPath()">💾 保存</button>
  <span class="db-count" id="db-count"></span>
  <span style="flex:1"></span>
</div>

<div class="container">
  <!-- 左半：输入区 -->
  <div class="card input-card">
    <div class="card-header">📥 输入</div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab-btn active" data-tab="curl">curl 命令</button>
        <button class="tab-btn" data-tab="text">文本描述</button>
        <button class="tab-btn" data-tab="image">📸 截图识别</button>
      </div>

      <!-- curl 输入 -->
      <div id="curl-group" class="input-group">
        <textarea id="curl-input" placeholder="粘贴 curl 命令，如：&#10;curl 'https://api.example.com/login' \&#10;  -H 'Content-Type: application/json' \&#10;  --data-raw '{"phone":"138****0001","code":"1111"}'"></textarea>
      </div>

      <!-- 文本输入 -->
      <div id="text-group" class="input-group hidden">
        <textarea id="text-input" placeholder="描述接口信息，如：&#10;POST /api/user/login&#10;参数: mobile(string,必填), code(string,必填), invite_code(string,选填)&#10;响应: {code, msg, data: {token, userId}}&#10;需要覆盖场景：正常登录、错误验证码、参数缺失、token提取"></textarea>
      </div>

      <!-- 图片输入 -->
      <div id="image-group" class="input-group hidden">
        <div class="upload-zone" id="upload-zone">
          <span class="icon">🖼️</span>
          <span class="hint">点击上传或拖拽截图到此处<br><small>支持 .png .jpg .webp</small></span>
          <img id="preview-img" alt="preview">
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>


      <!-- 通用截图附件（所有输入模式共用） -->
      <div style="padding:0;margin-top:4px;">
        <div style="font-size:12px;color:#888;margin-bottom:4px;">📎 附加截图（粘贴 / 拖拽 / 点击 +号）</div>
        <div class="attach-strip" id="attach-strip">
          <div class="attach-add" id="attach-add-btn" title="添加截图">+</div>
          <span class="attach-hint" id="attach-hint">Ctrl+V 粘贴，或拖拽图片到此处</span>
        </div>
        <input type="file" id="attach-file-input" accept="image/*" multiple style="display:none">
      </div>

      <div class="btn-row">
        <button class="btn btn-outline" onclick="clearAll()">清空</button>
        <button class="btn btn-primary" id="submit-btn" onclick="doGenerate()">
          <span class="spinner" id="spinner"></span>
          <span id="submit-text">⚡ 生成 YAML</span>
        </button>
        <label class="normalize-toggle" title="开启后：HTTP 200 + 仅判断 code 返回值">
          <input type="checkbox" id="normalize-switch" onchange="toggleNormalize()">
          <span class="toggle-track"></span>
          <span class="toggle-label">标准化</span>
        </label>
      </div>
    </div>
