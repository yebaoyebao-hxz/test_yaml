<div class="records-wrap">
  <div class="records-toolbar">
    <span style="font-weight:600;">🗄️ 用例仓库</span>
    <input id="records-search" placeholder="搜索文件名或摘要..." oninput="filterRecords()">
    <span class="count" id="records-count"></span>
    <button class="btn btn-outline" style="padding:4px 10px;font-size:12px;" onclick="loadRecords()">🔄 刷新</button>
  </div>
  <div id="records-table-wrap">
    <div class="records-empty" id="records-empty">加载中...</div>
    <table class="records-table" id="records-table" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>文件名</th>
          <th>输入类型</th>
          <th>摘要</th>
          <th>执行状态</th>
          <th>保存状态</th>
          <th>时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="records-tbody"></tbody>
    </table>
  </div>
</div>
