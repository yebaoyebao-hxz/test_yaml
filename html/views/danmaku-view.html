<section id="danmaku-view" class="view-section hidden wrap-common danmaku-wrap">
  <div class="card-common">
    <div class="dm-cat-tabs">
      <button class="dm-cat-btn active">全部</button>
      <button class="dm-cat-btn">直播场景</button>
      <button class="dm-cat-btn">点播场景</button>
      <button class="dm-cat-btn">互动场景</button>
    </div>
    <div class="dm-project-list">
      <div class="dm-project-card">
        <div class="dm-pname">弹幕发送接口</div>
        <div class="dm-ename">Danmaku Send API</div>
        <div class="dm-url">https://api.example.com/danmaku/send</div>
        <div class="dm-meta">
          <span class="dm-method dm-method-POST">POST</span>
          <span style="font-size:11px; color:#999;">压测次数：12</span>
        </div>
      </div>
      <div class="dm-project-card">
        <div class="dm-pname">弹幕列表查询</div>
        <div class="dm-ename">Danmaku List API</div>
        <div class="dm-url">https://api.example.com/danmaku/list</div>
        <div class="dm-meta">
          <span class="dm-method dm-method-GET">GET</span>
          <span style="font-size:11px; color:#999;">压测次数：8</span>
        </div>
      </div>
    </div>
  </div>
  <div class="card-common">
    <h4 style="font-size:14px; margin-bottom:16px; color:#333;">弹幕压测配置</h4>
    <div class="perf-row">
      <label>压测QPS</label>
      <input type="number" placeholder="每秒发送弹幕数" value="100">
    </div>
    <div class="perf-row">
      <label>用户数</label>
      <input type="number" placeholder="模拟在线用户数" value="1000">
    </div>
    <div class="perf-row">
      <label>弹幕模板</label>
      <textarea class="perf-body-input" placeholder='{"content": "${random_text}", "uid": "${random_uid}"}'></textarea>
    </div>
    <div class="perf-btn-row" style="margin-top:16px;">
      <button class="btn-perf-run">开始弹幕压测</button>
      <button class="btn-perf-stop">停止压测</button>
    </div>
    <div class="perf-progress" style="margin-top:10px;">
      <div class="perf-progress-bar"></div>
    </div>
  </div>
</section>
