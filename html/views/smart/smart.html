<div class="db-bar">
  <span>🗄️ 数据库:</span>
  <input id="smart-db-path" placeholder="E:\\yebao\\test_yaml\\history.db" title="SQLite 数据库路径，留空使用默认">
  <button class="btn btn-outline" onclick="setDbPath()">💾 保存</button>
  <span class="db-count" id="smart-db-count"></span>
  <span style="flex:1"></span>
</div>

<div class="container">
  <!-- 左侧：输入 → 解析 → 选择 → 生成 -->
  <div class="card input-card">
    <div class="card-header">📥 批量 API 描述输入</div>
    <div class="card-body">
      <div style="font-size:12px;color:#888;margin-bottom:6px;">
        💡 粘贴多个 API 描述，用<b>空行</b>或 <code>---</code> 分隔不同接口
      </div>
      <textarea id="smart-input" placeholder="粘贴 API 描述，多个接口用空行分隔：&#10;&#10;POST /api/user/login&#10;参数: phone(string,必填), code(string,必填)&#10;响应: {code, msg, data: {token}}&#10;&#10;GET /api/user/info&#10;Headers: Authorization: Bearer TOKEN&#10;响应: {code, data: {userId, nickname}}&#10;&#10;POST /api/order/create&#10;参数: goodsId(int), count(int), addressId(int)&#10;响应: {code, data: {orderId, totalPrice}}" style="min-height:160px;flex:none;"></textarea>

      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-outline" onclick="clearSmartInput()">🗑 清空</button>
        <button class="btn btn-primary" id="smart-smoke-btn" onclick="doSmartGenerate('smoke')" style="background:linear-gradient(135deg,#52c41a,#73d13d);">
          <span class="spinner" id="smart-spinner" style="display:none;"></span>
          🌫️ 生成冒烟用例
        </button>
        <button class="btn btn-primary" id="smart-stress-btn" onclick="doSmartGenerate('stress')" style="background:linear-gradient(135deg,#e8433c,#ff6b6b);">
          <span class="spinner" id="smart-spinner-2" style="display:none;"></span>
          💥 生成压测用例
        </button>
        <label class="normalize-toggle" title="标准化断言：HTTP 200 + 仅判断 code 返回值" style="margin-left:auto;">
          <input type="checkbox" id="smart-normalize-switch">
          <span class="toggle-track"></span>
          <span class="toggle-label">标准化</span>
        </label>
      </div>

      <!-- API 选择列表 -->
      <div id="smart-api-list" style="display:none;margin-top:8px;" class="smart-api-list-box">
        <div class="smart-toolbar">
          <span class="title">📋 已解析 (<span id="smart-api-count">0</span> 个)</span>
          <span style="flex:1"></span>
          <button class="btn btn-outline" style="padding:2px 10px;font-size:11px;" onclick="smartSelectAll()">全选</button>
          <button class="btn btn-outline" style="padding:2px 10px;font-size:11px;" onclick="smartDeselectAll()">取消全选</button>
        </div>
        <div id="smart-api-checks"></div>
      </div>
    </div>
  </div>

  <!-- 右上半：摘要 -->
  <div class="card" style="max-height:120px;">
    <div class="card-header">
      📋 生成摘要
      <span class="model-tag" id="smart-model-tag"></span>
    </div>
    <div class="card-body" style="padding:6px 16px 4px;">
      <div id="smart-summary-box" style="color:#888;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">等待生成...</div>
    </div>
  </div>

  <!-- 右下：YAML 输出 -->
  <div class="card" style="overflow:visible;">
    <div class="card-header output-header">
      📄 YAML 输出
      <span id="smart-status-badge"></span>
    </div>
    <div class="yaml-scroll">
      <textarea class="yaml-output" id="smart-yaml-output" placeholder="等待生成..." readonly spellcheck="false"></textarea>
    </div>
    <div class="output-actions">
      <button class="btn btn-execute" id="smart-execute-btn" onclick="doSmartExecute()">
        <span class="spinner" id="smart-exec-spinner"></span>
        🚀 执行用例
      </button>
      <button class="btn btn-ai-assert" id="smart-ai-assert-btn" onclick="doSmartAiAssert()">
        <span class="spinner" id="smart-ai-spinner"></span>
        🤖 AI断言
      </button>
      <span style="flex:1"></span>
      <button class="btn btn-outline" onclick="smartCopyYaml()">📋 复制 YAML</button>
      <button class="btn btn-primary" onclick="smartDownloadYaml()" style="flex:none">💾 下载 .yaml</button>
    </div>
  </div>
</div>
